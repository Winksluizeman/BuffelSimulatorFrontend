<form (ngSubmit)="onRegister()">

  <mat-form-field>
    <mat-label>Naam</mat-label>
    <input
      matInput
      [(ngModel)]="credentials.name"
      name="name"
      autocomplete="name">
  </mat-form-field>

  <mat-form-field>
    <mat-label>E-mail</mat-label>
    <input
      matInput
      [(ngModel)]="credentials.email"
      name="email"
      type="email"
      autocomplete="email">
  </mat-form-field>

  <mat-form-field>
    <mat-label>Wachtwoord</mat-label>
    <input
      matInput
      [(ngModel)]="credentials.password"
      name="password"
      type="password"
      autocomplete="new-password">
  </mat-form-field>

  <button mat-button type="submit">Registreren</button>
  <button mat-button type="button" (click)="router.navigate(['/login'])">
    Terug naar inloggen
  </button>

</form>
