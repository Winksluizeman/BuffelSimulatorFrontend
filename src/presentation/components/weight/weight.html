<h1> Ingelogd als: {{name}}</h1>

<form class="pushInput-form" (ngSubmit)="onSubmit()">
  <mat-form-field class="pushInput-form-fullwidth">
    <mat-label>Oefening naam</mat-label>
    <input matInput [(ngModel)]="exercise.name" name="name" placeholder="bijv. Latpull">
  </mat-form-field>

  <mat-form-field class="pushInput-form-fullwidth">
    <mat-label>Categorie</mat-label>
    <input matInput [(ngModel)]="exercise.category" name="category" placeholder="push / pull / leg">
  </mat-form-field>

  <mat-form-field class="pushInput-form-fullwidth">
    <mat-label>Gewicht (kg)</mat-label>
    <input matInput [(ngModel)]="exercise.weight" name="weight" type="number">
  </mat-form-field>

  <mat-form-field class="pushInput-form-fullwidth">
    <mat-label>Reps</mat-label>
    <input matInput [(ngModel)]="exercise.reps" name="reps" type="number">
  </mat-form-field>

  <button mat-button type="submit">Opslaan</button>
</form>

<table mat-table [dataSource]="exercises" class="mat-elevation-z8">

  <!-- Name Column -->
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef> Naam </th>
    <td mat-cell *matCellDef="let exercise"> {{exercise.name}} </td>
  </ng-container>

  <!-- Category Column -->
  <ng-container matColumnDef="category">
    <th mat-header-cell *matHeaderCellDef> Categorie </th>
    <td mat-cell *matCellDef="let exercise"> {{exercise.category}} </td>
  </ng-container>

  <!-- Weight Column -->
  <ng-container matColumnDef="weight">
    <th mat-header-cell *matHeaderCellDef> Gewicht (kg) </th>
    <td mat-cell *matCellDef="let exercise"> {{exercise.weight}} </td>
  </ng-container>

  <!-- Reps Column -->
  <ng-container matColumnDef="reps">
    <th mat-header-cell *matHeaderCellDef> Reps </th>
    <td mat-cell *matCellDef="let exercise"> {{exercise.reps}} </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>
