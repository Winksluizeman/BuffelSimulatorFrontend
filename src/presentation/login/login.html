<form (ngSubmit)="onLogin()">

  <mat-form-field>
    <mat-label>Gebruikersnaam</mat-label>
    <input
      matInput
      [(ngModel)]="credentials.username"
      name="username"
      autocomplete="username">
  </mat-form-field>

  <mat-form-field>
    <mat-label>Wachtwoord</mat-label>
    <input
      matInput
      [(ngModel)]="credentials.password"
      name="password"
      type="password"
      autocomplete="current-password">
  </mat-form-field>

  <button mat-button type="submit">Inloggen </button>
</form>

<button mat-button routerLink="/register">Registreren</button>
