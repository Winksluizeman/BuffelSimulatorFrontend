name: Frontend CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  frontend:
    name: Build, Test & Analyse Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installeer dependencies
        run: npm ci

      - name: Build Angular applicatie
        run: npm run build

      # ─── Stap 1: E2E tests via Cypress ───────────────────────────
      - name: E2E tests uitvoeren
        run: npm run e2e:ci

      # ─── Stap 2: Cypress screenshots uploaden bij falen ──────────
      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
          retention-days: 14

      # ─── Stap 3: SonarCloud analyse ───────────────────────────────
      - name: SonarCloud analyse
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
